services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: kunzong
      MYSQL_USER: kunzong
      MYSQL_PASSWORD: kunzong
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/001_init_mysql.sql:/docker-entrypoint-initdb.d/001_init_mysql.sql:ro
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kunzong
      POSTGRES_USER: kunzong
      POSTGRES_PASSWORD: kunzong
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
volumes:
  mysql_data:
  postgres_data:
  minio_data:
